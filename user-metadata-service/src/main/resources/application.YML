server:
  port: 8080

spring:
  application:
    name: user-metadata-service
  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
    show-sql: true

# Circuit Breaker - for DB writes only (as required)
resilience4j:
  circuitbreaker:
    instances:
      dbWriteCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - java.lang.IllegalArgumentException

  # Retry with exponential backoff + jitter (as required)
  retry:
    instances:
      dbWriteRetry:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - org.springframework.dao.TransientDataAccessException
          - java.sql.SQLTransientException
        ignoreExceptions:
          - java.lang.IllegalArgumentException

# Metrics endpoint
management:
  endpoints:
    web:
      exposure:
        include: health, metrics